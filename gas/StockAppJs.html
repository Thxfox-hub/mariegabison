<script>
// ═══════════════════════════════════════════════════════════════
// Configuration du Google Form
// ═══════════════════════════════════════════════════════════════
var FORM_ID = '1FAIpQLSf1wZQ-5rFkKDgd5IfqTy_4cYBDCAJ1ZrZyhnDHdPUTrPhRRg';
var FORM_SUBMIT_URL = 'https://docs.google.com/forms/d/e/' + FORM_ID + '/formResponse';

// Données injectées côté serveur (pas de fetch, pas de google.script.run)
var STOCK_DATA = <?= stockDataJson ?>;

// Entry IDs du formulaire (à ajuster si le formulaire change)
var ENTRY = {
  name:        'entry.1599191546',  // Nom (hidden)
  type:        'entry.1541764032',  // Type (radio: Collier/Bracelet/Boucles/Autre)
  typeSentinel:'entry.1541764032_sentinel',
  price:       'entry.1818115217',  // Prix (hidden)
  description: 'entry.1685287951'   // Description (hidden)
};

// ═══════════════════════════════════════════════════════════════
// État global
// ═══════════════════════════════════════════════════════════════
var allProducts = [];
var activeCategory = 'all';
var deleteTargetRow = null;

// ═══════════════════════════════════════════════════════════════
// Chargement du stock
// ═══════════════════════════════════════════════════════════════
function loadStock() {
  var content = document.getElementById('content');

  // Les données sont injectées côté serveur dans STOCK_DATA
  if (STOCK_DATA.error) {
    content.innerHTML = '<div class="empty-state"><div class="icon">⚠</div><h3>Erreur</h3><p>' + escapeHtml(STOCK_DATA.error) + '</p></div>';
    return;
  }
  allProducts = STOCK_DATA.items || [];
  renderCategoryFilters();
  renderStats();
  renderProducts();
}

// ═══════════════════════════════════════════════════════════════
// Filtres par catégorie
// ═══════════════════════════════════════════════════════════════
function renderCategoryFilters() {
  var counts = {};
  allProducts.forEach(function(p) {
    var cat = p.category || 'Autre';
    counts[cat] = (counts[cat] || 0) + 1;
  });

  var cats = Object.keys(counts).sort();
  var html = '<button class="cat-btn ' + (activeCategory === 'all' ? 'active' : '') + '" onclick="setCategory(\'all\')">' +
    'Tout <span class="count">(' + allProducts.length + ')</span></button>';

  cats.forEach(function(cat) {
    html += '<button class="cat-btn ' + (activeCategory === cat ? 'active' : '') + '" onclick="setCategory(\'' + escapeAttr(cat) + '\')">' +
      escapeHtml(cat) + ' <span class="count">(' + counts[cat] + ')</span></button>';
  });

  document.getElementById('categoryFilters').innerHTML = html;
}

function setCategory(cat) {
  activeCategory = cat;
  renderCategoryFilters();
  renderProducts();
}

// ═══════════════════════════════════════════════════════════════
// Stats
// ═══════════════════════════════════════════════════════════════
function renderStats() {
  var total = allProducts.length;
  var withPrice = allProducts.filter(function(p) { return p.price && p.price !== ''; }).length;
  var withImage = allProducts.filter(function(p) {
    return (p.imageUrl && p.imageUrl.trim()) || (p.images && p.images.length > 0);
  }).length;
  var html = '<span class="stat"><strong>' + total + '</strong> produit' + (total > 1 ? 's' : '') + '</span>' +
    '<span class="stat"><strong>' + withPrice + '</strong> avec prix</span>' +
    '<span class="stat"><strong>' + withImage + '</strong> avec image</span>';
  document.getElementById('statsBar').innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════
// Rendu des produits
// ═══════════════════════════════════════════════════════════════
function renderProducts() {
  var content = document.getElementById('content');
  var search = (document.getElementById('searchInput').value || '').toLowerCase().trim();

  var filtered = allProducts.filter(function(p) {
    if (activeCategory !== 'all' && p.category !== activeCategory) return false;
    if (search) {
      var haystack = (p.title + ' ' + p.description + ' ' + p.type).toLowerCase();
      if (haystack.indexOf(search) === -1) return false;
    }
    return true;
  });

  if (filtered.length === 0) {
    content.innerHTML = '<div class="empty-state">' +
      '<div class="icon">📦</div>' +
      '<h3>Aucun produit</h3>' +
      '<p>' + (search ? 'Aucun résultat pour "' + escapeHtml(search) + '"' : 'Le stock est vide. Cliquez sur "Ajouter un produit".') + '</p>' +
    '</div>';
    return;
  }

  var html = '<div class="product-grid">';
  filtered.forEach(function(p) {
    var imgHtml = '';
    var firstImg = '';
    if (p.imageUrl && p.imageUrl.trim()) {
      firstImg = p.imageUrl.trim();
    } else if (p.images && p.images.length) {
      firstImg = String(p.images[0] || '').trim();
    }
    if (firstImg) {
      imgHtml = '<img class="product-image" src="' + escapeAttr(firstImg) + '" alt="" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' +
        '<div class="product-image-placeholder" style="display:none;">◇</div>';
    } else {
      imgHtml = '<div class="product-image-placeholder">◇</div>';
    }

    var priceHtml = p.price ? '<span class="product-price">' + escapeHtml(formatPrice(p.price)) + ' €</span>' : '<span class="product-price" style="color:var(--muted)">—</span>';

    html += '<div class="product-card">' +
      imgHtml +
      '<div class="product-info">' +
        '<div class="product-name">' + escapeHtml(p.title || 'Sans nom') + '</div>' +
        '<div class="product-meta">' +
          priceHtml +
          '<span class="product-type">' + escapeHtml(p.category || 'Autre') + '</span>' +
        '</div>' +
        (p.description ? '<div class="product-desc">' + escapeHtml(p.description) + '</div>' : '') +
      '</div>' +
      '<div class="product-actions">' +
        '<button class="btn btn-danger" onclick="openDeleteModal(' + p.rowIndex + ', \'' + escapeAttr(p.title || 'Sans nom') + '\')">Supprimer</button>' +
      '</div>' +
    '</div>';
  });
  html += '</div>';

  content.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════
// Ajouter — submit au Google Form
// ═══════════════════════════════════════════════════════════════
function openAddModal() {
  document.getElementById('addModal').style.display = 'block';
  document.getElementById('addError').style.display = 'none';
  document.getElementById('addSuccess').style.display = 'none';
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('addForm').reset();
  setTimeout(function() { document.getElementById('f_name').focus(); }, 100);
}

function closeAddModal() {
  document.getElementById('addModal').style.display = 'none';
}

function submitAddForm(e) {
  e.preventDefault();
  var name = document.getElementById('f_name').value.trim();
  var type = document.getElementById('f_type').value;
  var price = document.getElementById('f_price').value.trim();
  var desc = document.getElementById('f_desc').value.trim();
  var errEl = document.getElementById('addError');
  var successEl = document.getElementById('addSuccess');
  var submitBtn = document.getElementById('submitBtn');

  if (!name) {
    errEl.textContent = 'Le nom est obligatoire.';
    errEl.style.display = 'block';
    return;
  }

  errEl.style.display = 'none';
  submitBtn.disabled = true;
  submitBtn.textContent = 'Envoi…';

  // Créer une iframe cachée comme cible
  var iframeName = 'submit_ifr_' + Date.now();
  var iframe = document.createElement('iframe');
  iframe.name = iframeName;
  iframe.style.display = 'none';
  document.body.appendChild(iframe);

  // Créer un form temporaire
  var form = document.createElement('form');
  form.method = 'POST';
  form.action = FORM_SUBMIT_URL;
  form.target = iframeName;
  form.style.display = 'none';

  function addField(name, value) {
    var input = document.createElement('input');
    input.type = 'hidden';
    input.name = name;
    input.value = value;
    form.appendChild(input);
  }

  addField(ENTRY.name, name);
  addField(ENTRY.type, type);
  addField(ENTRY.typeSentinel, '');
  addField(ENTRY.price, price);
  addField(ENTRY.description, desc);

  document.body.appendChild(form);
  form.submit();

  // Nettoyer après 3s et afficher le succès
  setTimeout(function() {
    try { document.body.removeChild(form); } catch(e) {}
    try { document.body.removeChild(iframe); } catch(e) {}
    successEl.style.display = 'block';
    submitBtn.textContent = 'Ajouter';
    submitBtn.disabled = false;

    // Fermer le modal et recharger la page après 1.5s
    setTimeout(function() {
      closeAddModal();
      showToast('Produit ajouté au stock');
      // Recharger pour voir le nouveau produit
      setTimeout(function() { window.location.reload(); }, 1000);
    }, 1500);
  }, 3000);
}

// ═══════════════════════════════════════════════════════════════
// Supprimer
// ═══════════════════════════════════════════════════════════════
function openDeleteModal(rowIndex, name) {
  deleteTargetRow = rowIndex;
  document.getElementById('deleteName').textContent = name;
  document.getElementById('deleteModal').style.display = 'block';
  var btn = document.getElementById('confirmDeleteBtn');
  btn.onclick = confirmDelete;
  btn.textContent = 'Supprimer';
  btn.disabled = false;
}

function closeDeleteModal() {
  document.getElementById('deleteModal').style.display = 'none';
  deleteTargetRow = null;
}

function confirmDelete() {
  if (!deleteTargetRow) return;
  var btn = document.getElementById('confirmDeleteBtn');
  btn.disabled = true;
  btn.textContent = 'Suppression…';

  // Navigation vers l'URL de suppression (le serveur supprime puis redirige)
  // L'URL courante contient déjà ?app=stock
  var url = window.location.href.split('#')[0];
  // Nettoyer les paramètres existants
  url = url.replace(/[?&]action=delete/g, '').replace(/[?&]row=[^&]*/g, '');
  // Ajouter les paramètres de suppression
  url += (url.indexOf('?') === -1 ? '?' : '&') + 'action=delete&row=' + deleteTargetRow;
  window.location.href = url;
}

// ═══════════════════════════════════════════════════════════════
// Utils
// ═══════════════════════════════════════════════════════════════
function escapeHtml(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function escapeAttr(s) {
  return String(s || '')
    .replace(/'/g, "\\'")
    .replace(/"/g, '&quot;');
}

function formatPrice(p) {
  var n = parseFloat(String(p).replace(/[€\s]/g, '').replace(',', '.'));
  return isNaN(n) ? String(p) : n.toFixed(2).replace('.', ',');
}

function showToast(msg) {
  var existing = document.querySelector('.toast');
  if (existing) existing.remove();
  var toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(function() { toast.remove(); }, 3000);
}

// ═══════════════════════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════════════════════
loadStock();
</script>
